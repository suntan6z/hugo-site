baseURL = "https://lorenzo.loconsole.eu"
title = "Lorenzo Loconsole"

# ── Multilingual ──────────────────────────────────────────────────────────
# The site is available in English (default), French and Italian.
# `defaultContentLanguageInSubdir = false` keeps English at the root
# (/blog/…) while French lives under /fr/… and Italian under /it/… — this
# preserves the existing English URLs and their SEO.
# Content is translated "by filename": a post bundle keeps index.md (English)
# and adds index.fr.md / index.it.md in the same folder, sharing its images.
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# Categories are only a frontmatter label for the JS blog filter, not browsable
# taxonomy term pages — disable taxonomy/term generation so Hugo doesn't emit
# phantom /categories/ pages (and the "no layout for kind taxonomy" build warning).
disableKinds = ["taxonomy", "term"]

# Single asset directory: `static/` was merged into `assets/`. Mounting `assets`
# to both the `assets` and `static` targets lets the same folder serve Hugo Pipes
# resources (resources.Get, e.g. the hero image) AND files copied verbatim to the
# site root (CSS, JS, fonts, favicon, …). Other roots (content, layouts, data,
# i18n, archetypes) keep their default mounts.
[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "assets"
    target = "static"

# ── Languages ─────────────────────────────────────────────────────────────
# Shared params live in the top-level [params] block below and are inherited by
# every language. Only language-varying params (description, quote) and the
# translated navigation menu are defined per language here.
[languages]
  [languages.en]
    locale = "en"
    label = "English"
    weight = 1
    [languages.en.params]
      description = "Tech enthusiast, EU-based tools advocate, and lover of good food. Currently exploring the intersection of technology and European identity."
      quote = "Arguing that you don't care about the right to privacy because you have nothing to hide is no different than saying you don't care about free speech because you have nothing to say."
    [languages.en.menus]
      [[languages.en.menus.main]]
        name = "About"
        pageRef = "/about"
        weight = 1
      [[languages.en.menus.main]]
        name = "Now"
        pageRef = "/now"
        weight = 2
      [[languages.en.menus.main]]
        name = "Blog"
        pageRef = "/blog"
        weight = 3
      [[languages.en.menus.main]]
        name = "Contact"
        pageRef = "/contact"
        weight = 4

  [languages.fr]
    locale = "fr"
    label = "Français"
    weight = 2
    [languages.fr.params]
      description = "Passionné de tech, défenseur des outils basés en Europe et amateur de bonne cuisine. J'explore en ce moment l'intersection entre la technologie et l'identité européenne."
      quote = "Prétendre que le droit à la vie privée vous importe peu parce que vous n'avez rien à cacher ne diffère en rien d'affirmer que la liberté d'expression vous importe peu parce que vous n'avez rien à dire."
    [languages.fr.menus]
      [[languages.fr.menus.main]]
        name = "À propos"
        pageRef = "/about"
        weight = 1
      [[languages.fr.menus.main]]
        name = "Maintenant"
        pageRef = "/now"
        weight = 2
      [[languages.fr.menus.main]]
        name = "Blog"
        pageRef = "/blog"
        weight = 3
      [[languages.fr.menus.main]]
        name = "Contact"
        pageRef = "/contact"
        weight = 4

  [languages.it]
    locale = "it"
    label = "Italiano"
    weight = 3
    [languages.it.params]
      description = "Appassionato di tecnologia, sostenitore degli strumenti con base in Europa e amante del buon cibo. Attualmente esploro l'intersezione tra tecnologia e identità europea."
      quote = "Sostenere che non ti importa del diritto alla privacy perché non hai nulla da nascondere non è diverso dal dire che non ti importa della libertà di parola perché non hai nulla da dire."
    [languages.it.menus]
      [[languages.it.menus.main]]
        name = "Chi sono"
        pageRef = "/about"
        weight = 1
      [[languages.it.menus.main]]
        name = "Ora"
        pageRef = "/now"
        weight = 2
      [[languages.it.menus.main]]
        name = "Blog"
        pageRef = "/blog"
        weight = 3
      [[languages.it.menus.main]]
        name = "Contatti"
        pageRef = "/contact"
        weight = 4

[params]
  author = "Lorenzo"
  resumeUrl = "/cv-fr.pdf"
  email = "lorenzo@loconsole.eu"
  location = "France, Europe 🇪🇺"
  linkedin = "https://www.linkedin.com/in/lloconsole/"
  mastodon = "https://c.im/@lv"
  telegram = "https://t.me/loconsole_bot"
  appleMusic = "https://music.apple.com/profile/thends"
  quoteAuthor = "Edward Snowden"
  quoteArticle = "edward-snowden-mass-surveillance"
  litlyxProjectId  = "6a39d3a301a7b289aa1d5f0b"
  litlyxBrokerHost = "analytics.loconsole.eu"

[taxonomies]
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"

enableRobotsTXT = true

[outputs]
  home = ["HTML", "Sitemap", "ROBOTS"]
  section = ["HTML", "RSS"]

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"
    rel = "alternate"
    isPlainText = false
    isHTML = false
    noUgly = true
    permalinkable = false
  [outputFormats.ROBOTS]
    mediaType = "text/plain"
    baseName = "robots"
    isPlainText = true
    notAlternative = true
