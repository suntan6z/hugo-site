<header id="site-header">
  <div class="header-inner">
    <a href="/" class="logo" aria-label="Lorenzo Loconsole — Home" style="display:flex;align-items:center">
      <img src="/img/logo.svg" alt="Lorenzo Loconsole" width="701" height="362" fetchpriority="high" style="height:4.5rem;width:auto;display:block" />
    </a>

    <!-- Desktop nav -->
    <nav class="desktop-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="nav-btn{{ if or (eq $.RelPermalink .URL) (hasPrefix $.RelPermalink .URL) }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
      <!-- Search icon -->
      <button class="icon-btn" onclick="openSearch()" title="Search" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <!-- Dark mode toggle -->
      {{ partial "theme-toggle.html" . }}
      <!-- Language switcher -->
      <span class="lang-btn">EN</span>
    </nav>

    <!-- Mobile hamburger -->
    <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <svg id="icon-menu" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <svg id="icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- Mobile nav -->
  <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation">
    <div class="mobile-nav-links">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="mobile-nav-link{{ if or (eq $.RelPermalink .URL) (hasPrefix $.RelPermalink .URL) }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
    <div class="mobile-nav-actions">
      <button class="icon-btn" onclick="openSearch();document.getElementById('hamburger').click()" title="Search" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      {{ partial "theme-toggle.html" . }}
      <span class="lang-btn">EN</span>
    </div>
  </nav>
</header>

<!-- Search modal -->
<div id="search-modal" role="dialog" aria-modal="true" aria-label="Search"
  style="display:none;position:fixed;inset:0;z-index:200;background:hsl(220 15% 15%/0.6);backdrop-filter:blur(4px);padding:1rem;align-items:flex-start;justify-content:center">
  <div id="search-box" style="max-width:660px;width:100%;margin-top:4rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px -10px hsl(220 15% 15%/0.3);overflow:hidden;display:flex;flex-direction:column">

    <!-- Input row -->
    <div style="display:flex;align-items:center;gap:0.75rem;padding:0.875rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted-foreground);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Search articles and pages…" oninput="runSearch(this.value)"
        style="flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:0.95rem;color:var(--foreground)" />
      <button id="search-filter-btn" onclick="togglePanel()" title="Advanced filters"
        style="display:flex;align-items:center;gap:0.3rem;padding:0.25rem 0.625rem;border-radius:0.4rem;border:1px solid var(--border);background:transparent;color:var(--muted-foreground);font-size:0.72rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        Filters <span id="filter-count-badge" style="display:none;background:var(--primary);color:var(--primary-foreground);border-radius:2rem;padding:0 0.35rem;font-size:0.65rem;line-height:1.5"></span>
      </button>
      <kbd style="font-size:0.7rem;color:var(--muted-foreground);border:1px solid var(--border);border-radius:0.3rem;padding:0.1rem 0.4rem;flex-shrink:0">Esc</kbd>
    </div>

    <!-- Advanced filter panel (collapsible) -->
    <div id="search-panel" style="display:none;border-bottom:1px solid var(--border);padding:1rem;flex-direction:column;gap:0.875rem;background:var(--background);flex-shrink:0">

      <!-- Category -->
      <div>
        <p style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted-foreground);margin-bottom:0.5rem">Category</p>
        <div id="fp-categories" style="display:flex;gap:0.4rem;flex-wrap:wrap"></div>
      </div>

      <!-- Date range -->
      <div>
        <p style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted-foreground);margin-bottom:0.5rem">Published between</p>
        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
          <select id="fp-year-from" onchange="applyFilters()" style="padding:0.3rem 0.5rem;border-radius:0.4rem;border:1px solid var(--border);background:var(--card);color:var(--foreground);font-size:0.8rem;cursor:pointer">
            <option value="">Any year</option>
          </select>
          <span style="font-size:0.8rem;color:var(--muted-foreground)">→</span>
          <select id="fp-year-to" onchange="applyFilters()" style="padding:0.3rem 0.5rem;border-radius:0.4rem;border:1px solid var(--border);background:var(--card);color:var(--foreground);font-size:0.8rem;cursor:pointer">
            <option value="">Any year</option>
          </select>
        </div>
      </div>

      <!-- Read time -->
      <div>
        <p style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted-foreground);margin-bottom:0.5rem">Read time</p>
        <div style="display:flex;gap:0.4rem;flex-wrap:wrap" id="fp-readtime">
          <button data-rt="" onclick="setReadTime('',this)" class="fp-rt-btn fp-rt-active">Any length</button>
          <button data-rt="short" onclick="setReadTime('short',this)" class="fp-rt-btn">Under 5 min</button>
          <button data-rt="medium" onclick="setReadTime('medium',this)" class="fp-rt-btn">5 – 15 min</button>
          <button data-rt="long" onclick="setReadTime('long',this)" class="fp-rt-btn">15+ min</button>
        </div>
      </div>

      <!-- Footer: active summary + clear -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:0.25rem">
        <span id="fp-summary" style="font-size:0.78rem;color:var(--muted-foreground)"></span>
        <button onclick="clearFilters()" style="font-size:0.78rem;color:var(--primary);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline">Clear all</button>
      </div>
    </div>

    <!-- Active filter tags (shown below panel when panel is closed but filters active) -->
    <div id="search-active-tags" style="display:none;padding:0.5rem 1rem;gap:0.4rem;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0"></div>

    <!-- Results -->
    <div id="search-results" style="max-height:420px;overflow-y:auto;padding:0.5rem">
      <div id="search-pages-group" aria-hidden="true" style="display:flex;flex-direction:column;padding:0.5rem 0">
        <p style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted-foreground);padding:0.25rem 0.75rem 0.5rem">Pages</p>
        <a href="/about"   onclick="closeSearch()" class="search-item" style="display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.75rem;border-radius:0.5rem;color:var(--foreground);font-size:0.875rem;text-decoration:none;transition:background 0.12s" onmouseover="this.style.background='var(--accent)'" onmouseout="this.style.background=''"><span style="color:var(--muted-foreground);font-weight:500">#</span><span>About</span></a>
        <a href="/now"     onclick="closeSearch()" class="search-item" style="display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.75rem;border-radius:0.5rem;color:var(--foreground);font-size:0.875rem;text-decoration:none;transition:background 0.12s" onmouseover="this.style.background='var(--accent)'" onmouseout="this.style.background=''"><span style="color:var(--muted-foreground);font-weight:500">#</span><span>Now</span></a>
        <a href="/blog"    onclick="closeSearch()" class="search-item" style="display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.75rem;border-radius:0.5rem;color:var(--foreground);font-size:0.875rem;text-decoration:none;transition:background 0.12s" onmouseover="this.style.background='var(--accent)'" onmouseout="this.style.background=''"><span style="color:var(--muted-foreground);font-weight:500">#</span><span>Blog</span></a>
        <a href="/contact" onclick="closeSearch()" class="search-item" style="display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.75rem;border-radius:0.5rem;color:var(--foreground);font-size:0.875rem;text-decoration:none;transition:background 0.12s" onmouseover="this.style.background='var(--accent)'" onmouseout="this.style.background=''"><span style="color:var(--muted-foreground);font-weight:500">#</span><span>Contact</span></a>
      </div>
      <div id="search-articles"></div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   SEARCH INDEX  (Hugo-injected)
═══════════════════════════════════════════════════ */
const searchIndex = [
  {{ range where .Site.RegularPages "Section" "blog" }}
  {
    title:     {{ .Title | jsonify | safeJS }},
    url:       {{ .Permalink | jsonify | safeJS }},
    type:      "article",
    category:  {{ .Params.category | jsonify | safeJS }},
    tags:      {{ .Params.tags | jsonify | safeJS }},
    author:    {{ .Params.author | default "Lorenzo Loconsole" | jsonify | safeJS }},
    date:      {{ .Date.Format "Jan 2, 2006" | jsonify | safeJS }},
    dateISO:   {{ .Date.Format "2006-01-02" | jsonify | safeJS }},
    year:      {{ .Date.Format "2006" | jsonify | safeJS }},
    wordCount: {{ .WordCount }},
    excerpt:   {{ .Summary | replaceRE "<h[1-6][^>]*>.*?</h[1-6]>" "" | replaceRE "<[^>]+>" "" | htmlUnescape | plainify | truncate 220 | jsonify | safeJS }},
    body:      {{ .Plain | htmlUnescape | truncate 8000 "" | jsonify | safeJS }}
  },
  {{ end }}
  {{ range where .Site.RegularPages "Section" "ne" "blog" }}
  {
    title:     {{ .Title | jsonify | safeJS }},
    url:       {{ .Permalink | jsonify | safeJS }},
    type:      "page",
    category:  "Page",
    tags:      "",
    author:    "Lorenzo Loconsole",
    date:      "",
    dateISO:   "",
    year:      "",
    wordCount: {{ .WordCount }},
    excerpt:   {{ .Summary | plainify | truncate 220 | jsonify | safeJS }},
    body:      {{ .Plain | htmlUnescape | truncate 8000 "" | jsonify | safeJS }}
  },
  {{ end }}
];

/* read time in minutes from word count */
searchIndex.forEach(p => { p.readMin = Math.max(1, Math.round(p.wordCount / 200)); });

/* ═══════════════════════════════════════════════════
   SPELL-CORRECTION  ("did you mean …")
═══════════════════════════════════════════════════ */
/* vocabulary: every word >= 4 chars from titles, categories and bodies, with frequency */
const searchVocab = (() => {
  const freq = new Map();
  searchIndex.forEach(p => {
    const text = ((p.title || '') + ' ' + (p.category || '') + ' ' + (p.body || '')).toLowerCase();
    (text.match(/[a-zà-ÿ0-9]+/g) || []).forEach(w => {
      if (w.length >= 4) freq.set(w, (freq.get(w) || 0) + 1);
    });
  });
  return freq;
})();

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n;
  if (!n) return m;
  let prev = Array.from({ length: n + 1 }, (_, j) => j);
  let curr = new Array(n + 1);
  for (let i = 1; i <= m; i++) {
    curr[0] = i;
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      curr[j] = Math.min(prev[j] + 1, curr[j - 1] + 1, prev[j - 1] + cost);
    }
    [prev, curr] = [curr, prev];
  }
  return prev[n];
}

/* return a corrected query string if any term looks misspelled, else null */
function didYouMean(query) {
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  let changed = false;
  const fixed = terms.map(t => {
    if (t.length < 4 || searchVocab.has(t)) return t;
    const maxD = t.length <= 5 ? 1 : 2;
    let best = null, bestD = Infinity, bestF = 0;
    for (const [w, f] of searchVocab) {
      if (Math.abs(w.length - t.length) > maxD) continue;
      const d = levenshtein(t, w);
      if (d < bestD || (d === bestD && f > bestF)) { bestD = d; best = w; bestF = f; }
    }
    if (best && bestD <= maxD) { changed = true; return best; }
    return t;
  });
  return changed ? fixed.join(' ') : null;
}

function applySuggestion(s) {
  const input = document.getElementById('search-input');
  input.value = s;
  renderResults(s);
}

/* ═══════════════════════════════════════════════════
   FILTER STATE
═══════════════════════════════════════════════════ */
const allCategories = [...new Set(searchIndex.map(p => p.category).filter(Boolean))].sort();
const allYears      = [...new Set(searchIndex.map(p => p.year).filter(Boolean))].sort();

const F = {               // active filters
  categories: [],         // [] = all
  yearFrom:   '',
  yearTo:     '',
  readTime:   '',         // '' | 'short' | 'medium' | 'long'
};
let panelOpen = false;

function activeFilterCount() {
  return (F.categories.length > 0 ? 1 : 0)
       + (F.yearFrom || F.yearTo ? 1 : 0)
       + (F.readTime ? 1 : 0);
}

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function escRE(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function hl(text, q) {
  if (!q || !text) return text || '';
  const terms = q.split(/\s+/).filter(Boolean).map(escRE);
  if (!terms.length) return text;
  return text.replace(new RegExp('(' + terms.join('|') + ')', 'gi'),
    '<mark style="background:hsl(350 45% 40%/0.18);color:inherit;border-radius:2px;padding:0 2px">$1</mark>');
}

function snippet(text, q, r) {
  r = r || 90;
  if (!text) return '';
  if (!q) return text.slice(0, r * 2);
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return text.slice(0, r * 2) + (text.length > r * 2 ? '…' : '');
  const s = Math.max(0, i - r), e = Math.min(text.length, i + q.length + r);
  return (s > 0 ? '…' : '') + text.slice(s, e) + (e < text.length ? '…' : '');
}

/* pick the best text source (excerpt, else body) and centre the snippet on a matching term */
function bestSnippet(p, q) {
  const terms = q.split(/\s+/).filter(Boolean);
  const inExcerpt = terms.find(t => (p.excerpt || '').toLowerCase().includes(t.toLowerCase()));
  if (inExcerpt) return snippet(p.excerpt, inExcerpt);
  const inBody = terms.find(t => (p.body || '').toLowerCase().includes(t.toLowerCase()));
  if (inBody) return snippet(p.body, inBody);
  return (p.excerpt || p.body || '').slice(0, 180);
}

function scoreP(p, ql) {
  const terms = ql.split(/\s+/).filter(Boolean);
  if (!terms.length) return 0;
  const title = (p.title || '').toLowerCase();
  const cat   = (p.category || '').toLowerCase();
  const auth  = (p.author || '').toLowerCase();
  const exc   = (p.excerpt || '').toLowerCase();
  const body  = (p.body || '').toLowerCase();
  let s = 0;
  for (const t of terms) {
    const inAny = title.includes(t) || cat.includes(t) || auth.includes(t) || exc.includes(t) || body.includes(t);
    if (!inAny) return 0;           // every term must appear somewhere (AND search)
    if (title.includes(t)) s += 12;
    if (cat.includes(t))   s += 6;
    if (auth.includes(t))  s += 3;
    if (exc.includes(t))   s += 4;
    if (body.includes(t))  s += 2;
  }
  return s;
}

function matchesFilters(p) {
  if (F.categories.length && !F.categories.includes(p.category)) return false;
  if (F.yearFrom && p.year < F.yearFrom) return false;
  if (F.yearTo   && p.year > F.yearTo)   return false;
  if (F.readTime === 'short'  && p.readMin >= 5)  return false;
  if (F.readTime === 'medium' && (p.readMin < 5 || p.readMin > 15)) return false;
  if (F.readTime === 'long'   && p.readMin <= 15) return false;
  return true;
}

/* ═══════════════════════════════════════════════════
   OPEN / CLOSE
═══════════════════════════════════════════════════ */
function openSearch() {
  document.getElementById('search-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('search-input').focus(), 30);
  document.getElementById('search-input').value = '';
  Object.assign(F, { categories: [], yearFrom: '', yearTo: '', readTime: '' });
  panelOpen = false;
  initPanel();
  renderActiveTags();
  renderResults('');
}

function closeSearch() {
  document.getElementById('search-modal').style.display = 'none';
}

/* ═══════════════════════════════════════════════════
   PANEL INIT & TOGGLE
═══════════════════════════════════════════════════ */
function initPanel() {
  /* Category pills */
  const catEl = document.getElementById('fp-categories');
  catEl.innerHTML = allCategories.map(c => {
    const active = F.categories.includes(c);
    return `<button onclick="toggleCategory(${JSON.stringify(c)})"
      class="fp-cat-btn${active ? ' fp-cat-active' : ''}"
      style="padding:0.25rem 0.75rem;border-radius:2rem;border:1px solid ${active ? 'var(--primary)' : 'var(--border)'};
      background:${active ? 'var(--primary)' : 'transparent'};color:${active ? 'var(--primary-foreground)' : 'var(--muted-foreground)'};
      font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s">${c}</button>`;
  }).join('');

  /* Year dropdowns */
  const fromEl = document.getElementById('fp-year-from');
  const toEl   = document.getElementById('fp-year-to');
  [fromEl, toEl].forEach(el => {
    const cur = el.value;
    el.innerHTML = '<option value="">Any year</option>' +
      allYears.map(y => `<option value="${y}"${y === cur ? ' selected' : ''}>${y}</option>`).join('');
  });
  fromEl.value = F.yearFrom;
  toEl.value   = F.yearTo;

  /* Read time buttons */
  document.querySelectorAll('.fp-rt-btn').forEach(btn => {
    const active = btn.dataset.rt === F.readTime;
    btn.style.cssText = `padding:0.25rem 0.75rem;border-radius:2rem;border:1px solid ${active ? 'var(--primary)' : 'var(--border)'};
      background:${active ? 'var(--primary)' : 'transparent'};color:${active ? 'var(--primary-foreground)' : 'var(--muted-foreground)'};
      font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s`;
  });

  updateFilterBadge();
  updatePanelSummary();
}

function togglePanel() {
  panelOpen = !panelOpen;
  const panel = document.getElementById('search-panel');
  panel.style.display = panelOpen ? 'flex' : 'none';
  const btn = document.getElementById('search-filter-btn');
  btn.style.borderColor  = panelOpen ? 'var(--primary)' : 'var(--border)';
  btn.style.color        = panelOpen ? 'var(--primary)' : 'var(--muted-foreground)';
  btn.style.background   = panelOpen ? 'hsl(350 45% 40%/0.08)' : 'transparent';
  if (panelOpen) initPanel();
}

/* ═══════════════════════════════════════════════════
   FILTER ACTIONS
═══════════════════════════════════════════════════ */
function toggleCategory(cat) {
  const idx = F.categories.indexOf(cat);
  if (idx === -1) F.categories.push(cat);
  else F.categories.splice(idx, 1);
  initPanel();
  renderActiveTags();
  renderResults(document.getElementById('search-input').value);
}

function setReadTime(val, btn) {
  F.readTime = val;
  initPanel();
  renderActiveTags();
  renderResults(document.getElementById('search-input').value);
}

function applyFilters() {
  F.yearFrom = document.getElementById('fp-year-from').value;
  F.yearTo   = document.getElementById('fp-year-to').value;
  updateFilterBadge();
  renderActiveTags();
  renderResults(document.getElementById('search-input').value);
}

function clearFilters() {
  Object.assign(F, { categories: [], yearFrom: '', yearTo: '', readTime: '' });
  initPanel();
  renderActiveTags();
  renderResults(document.getElementById('search-input').value);
}

function updateFilterBadge() {
  const n = activeFilterCount();
  const badge = document.getElementById('filter-count-badge');
  badge.textContent = n;
  badge.style.display = n ? 'inline' : 'none';
}

function updatePanelSummary() {
  const n = activeFilterCount();
  document.getElementById('fp-summary').textContent =
    n ? `${n} filter${n > 1 ? 's' : ''} active` : 'No filters active';
}

/* ── Active filter tags bar (shown when panel closed & filters on) */
function renderActiveTags() {
  updateFilterBadge();
  updatePanelSummary();
  const bar = document.getElementById('search-active-tags');
  const tags = [];
  F.categories.forEach(c => tags.push({ label: `Category: ${c}`, clear: () => { F.categories = F.categories.filter(x=>x!==c); applyFiltersFromState(); } }));
  if (F.yearFrom || F.yearTo) tags.push({ label: `Year: ${F.yearFrom||'any'} → ${F.yearTo||'any'}`, clear: () => { F.yearFrom=''; F.yearTo=''; document.getElementById('fp-year-from').value=''; document.getElementById('fp-year-to').value=''; applyFiltersFromState(); } });
  if (F.readTime) tags.push({ label: `Read: ${F.readTime==='short'?'< 5 min':F.readTime==='medium'?'5–15 min':'15+ min'}`, clear: () => { F.readTime=''; applyFiltersFromState(); } });
  if (!panelOpen && tags.length) {
    bar.style.display = 'flex';
    bar.innerHTML = tags.map((t,i) => `<span style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.6rem;border-radius:2rem;border:1px solid var(--primary);font-size:0.72rem;color:var(--primary);background:hsl(350 45% 40%/0.07)">
      ${t.label}
      <button onclick="_clearTag(${i})" style="background:none;border:none;cursor:pointer;color:var(--primary);padding:0;line-height:1;font-size:1rem">×</button>
    </span>`).join('');
    window._tagClears = tags.map(t => t.clear);
  } else {
    bar.style.display = 'none';
  }
}
window._clearTag = (i) => { window._tagClears[i](); };

function applyFiltersFromState() {
  initPanel();
  renderActiveTags();
  renderResults(document.getElementById('search-input').value);
}

/* ═══════════════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════════════ */
function renderResults(query) {
  const articlesEl = document.getElementById('search-articles');
  const pagesGroup = document.getElementById('search-pages-group');
  const q  = (query || '').trim();
  const ql = q.toLowerCase();
  const hasFilters = activeFilterCount() > 0;

  /* Static Pages quick-links only show in the no-query nav state */
  pagesGroup.style.display = (!hasFilters && !q) ? 'flex' : 'none';

  /* Filter pass */
  let results = searchIndex.filter(matchesFilters);

  /* Text search */
  if (q) {
    results = results
      .map(p => ({ ...p, _score: scoreP(p, ql) }))
      .filter(p => p._score > 0)
      .sort((a, b) => b._score - a._score);
  } else {
    results = results
      .filter(p => p.type === 'article')
      .sort((a, b) => b.dateISO.localeCompare(a.dateISO));
  }

  /* Empty state — offer a spelling suggestion when nothing matches */
  if (!results.length) {
    const suggestion = q ? didYouMean(q) : null;
    articlesEl.innerHTML = `<div style="padding:2rem 0.75rem;text-align:center">
      <p style="font-size:1.4rem;margin-bottom:0.5rem">🔍</p>
      <p style="font-size:0.875rem;color:var(--muted-foreground)">No results match${q ? ' <strong>' + q + '</strong>' : ''}${hasFilters ? ' with the current filters' : ''}.</p>
      ${suggestion ? `<p style="font-size:0.9rem;color:var(--foreground);margin-top:0.75rem">Did you mean <button onclick="applySuggestion('${suggestion}')" style="background:none;border:none;cursor:pointer;color:var(--primary);font-weight:600;font-style:italic;padding:0;font-size:0.9rem">${suggestion}</button>?</p>` : ''}
      ${hasFilters ? `<button onclick="clearFilters()" style="margin-top:0.75rem;font-size:0.8rem;color:var(--primary);background:none;border:none;cursor:pointer;text-decoration:underline">Clear all filters</button>` : ''}
    </div>`;
    return;
  }

  const calIcon   = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:.7"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
  const clockIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:.7"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const fileIcon  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted-foreground);flex-shrink:0;margin-top:1px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

  const shown = results.slice(0, 8);
  articlesEl.innerHTML = `
    <div style="display:flex;flex-direction:column;padding:0.25rem 0">
      <p style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted-foreground);padding:0.5rem 0.75rem 0.35rem">
        ${q ? 'Results' : 'Recent articles'} <span style="font-weight:400">(${shown.length} of ${results.length})</span>
      </p>
      ${shown.map(p => {
        const snip = q ? bestSnippet(p, q) : (p.excerpt || '').slice(0, 130);
        return `<a href="${p.url}" onclick="closeSearch()" style="display:flex;align-items:flex-start;gap:0.625rem;padding:0.55rem 0.75rem;border-radius:0.5rem;color:var(--foreground);font-size:0.875rem;text-decoration:none;transition:background 0.12s"
          onmouseover="this.style.background='var(--accent)'" onmouseout="this.style.background=''">
          ${fileIcon}
          <div style="min-width:0;flex:1">
            <div style="font-weight:600;line-height:1.3;margin-bottom:0.25rem">${hl(p.title, q)}</div>
            <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-bottom:${snip?'0.25rem':'0'}">
              ${p.category ? `<span style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--primary)">${p.category}</span>` : ''}
              ${p.date ? `<span style="display:flex;align-items:center;gap:0.2rem;font-size:0.7rem;color:var(--muted-foreground)">${calIcon} ${p.date}</span>` : ''}
              ${p.type === 'article' ? `<span style="display:flex;align-items:center;gap:0.2rem;font-size:0.7rem;color:var(--muted-foreground)">${clockIcon} ${p.readMin} min read</span>` : ''}
            </div>
            ${snip ? `<div style="font-size:0.78rem;color:var(--muted-foreground);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5">${hl(snip, q)}</div>` : ''}
          </div>
        </a>`;
      }).join('')}
      ${results.length > 8 ? `<p style="font-size:0.75rem;color:var(--muted-foreground);padding:0.5rem 0.75rem;text-align:center;border-top:1px solid var(--border);margin-top:0.25rem">Showing 8 of ${results.length} — refine your search or filters to narrow down</p>` : ''}
    </div>`;
}

function runSearch(query) {
  renderResults(query);
}

/* ═══════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape' && document.getElementById('search-modal').style.display === 'flex') closeSearch();
});
document.getElementById('search-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('search-modal')) closeSearch();
});
</script>
